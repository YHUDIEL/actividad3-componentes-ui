<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Actividad 3 - Componentes UI</title>
    <link rel="stylesheet" href="css/componente.css" />
  </head>
  <body>
    <div class="tarjeta">
      <h1>Componentes UI</h1>
      <p class="descripcion">
        Libreria de componentes visuales reutilizables hecha en JavaScript puro.
        Cada boton llama a <code>UIModal.open()</code> o <code>UIToast.show()</code>
        con distintos parametros, sin reescribir el componente cada vez.
      </p>

      <div class="grupo-botones">
        <button class="btn-azul" id="btn-modal-basico">Abrir modal informativo</button>
        <button class="btn-naranja" id="btn-modal-confirm">Abrir modal de confirmacion</button>
        <button class="btn-azul" id="btn-toast-info">Mostrar aviso informativo</button>
        <button class="btn-verde" id="btn-toast-success">Mostrar mensaje de exito</button>
        <button class="btn-rojo" id="btn-toast-error">Mostrar mensaje de error</button>
        <button class="btn-azul" id="btn-toast-varios">Mostrar varios toasts seguidos</button>
      </div>
    </div>

    <script src="js/componente.js"></script>
    <script src="js/demo.js"></script>
  </body>
</html>
